<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>NEXORA Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 18%, rgba(240, 81, 147, 0.24), transparent 28%),
          radial-gradient(circle at 82% 12%, rgba(0, 159, 209, 0.22), transparent 28%),
          #0f172a;
        color: #f8fafc;
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        width: min(90vw, 460px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.075);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(24px);
      }

      p {
        color: #cbd5e1;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NEXORA is offline</h1>
      <p>Your installed workspace shell is available. Reconnect to refresh app assets and external links.</p>
    </main>
  </body>
</html>
